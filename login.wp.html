<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Find Near Room - Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    /* ---------- COMMON STYLES ---------- */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    button { cursor: pointer; }

    /* ---------- LOGIN STYLES ---------- */
    #loginContainer {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: linear-gradient(to right, #fff5cc, #ffe680);
    }
    .login-box {
      background: #fff; padding: 30px; border-radius: 12px;
      box-shadow: 0 0 10px #ccc; width: 300px;
    }
    h2 { text-align: center; margin-bottom: 20px; }
    input {
      width: 100%; padding: 10px; margin-bottom: 15px;
      border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;
    }
    .error { color: red; font-size: 14px; text-align: center; margin-bottom: 10px; }
    .login-box button {
      width: 100%; background-color: #fbbf24; color: #000;
      padding: 10px; border: none; border-radius: 8px;
      cursor: pointer; font-weight: bold;
    }

    /* ---------- DASHBOARD STYLES ---------- */
    #dashboardContainer {
      display: none; padding: 20px;
      background: linear-gradient(to bottom right, #fff7cc, #fff0b3);
      min-height: 100vh;
    }
    h1 { text-align: center; color: #444; }
    .tabs {
      display: flex; justify-content: center; gap: 20px; margin-top: 20px;
    }
    .tabs button {
      padding: 10px 20px; font-weight: bold; border: none;
      border-radius: 10px; background-color: #ffdf80;
    }
    .tabs button.active { background-color: #fbbf24; border: 2px solid #e0a800; }
    .section { display: none; }
    .section.active { display: block; }
    .stats {
      margin: 20px auto; max-width: 300px; background: #fff3b0;
      padding: 15px; border-radius: 15px; text-align: center;
      font-size: 18px; box-shadow: 0 0 10px #ccc;
    }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 12px; vertical-align: top; }
    th { background-color: #ffdf80; }
    .edit-btn { background-color: #4CAF50; color: white; padding: 6px 10px; border: none; border-radius: 5px; margin: 3px; }
    .delete-btn { background-color: #f44336; color: white; padding: 6px 10px; border: none; border-radius: 5px; margin: 3px; }
    .hide-btn { background-color: #777; color: white; padding: 6px 10px; border: none; border-radius: 5px; margin: 3px; }
    .slider {
      width: 120px; height: 80px; overflow: hidden;
      position: relative; border-radius: 5px;
    }
    .slider img {
      width: 100%; height: 80px; object-fit: cover; display: none;
    }
    .slider img.active { display: block; }
    .slider-btn {
      position: absolute; top: 30%;
      background: rgba(0,0,0,0.3); color: white;
      border: none; font-size: 16px; padding: 2px 6px;
    }
    .slider-btn.left { left: 0; }
    .slider-btn.right { right: 0; }
    /* Modal styles */
    #editRoomModal, #editMateModal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.6);
      justify-content: center; align-items: center; z-index: 999;
    }
    #editRoomModal .modal-content, #editMateModal .modal-content {
      background: white; padding: 20px; border-radius: 10px;
      width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto;
    }
    #editRentContainer input {
      width: 60px; margin-right: 8px; margin-bottom: 10px; padding: 5px;
    }
    .hidden-post { background-color: #ddd !important; color: #888 !important; }
  </style>
</head>
<body>

<!-- LOGIN SECTION -->
<div id="loginContainer">
  <div class="login-box">
    <h2>Admin Panel Login</h2>
    <div class="error" id="errorMsg"></div>
    <input type="text" id="username" placeholder="Username" autocomplete="username" />
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD SECTION -->
<div id="dashboardContainer">
  <h1>Admin Dashboard - Find Near Room</h1>
  <div class="tabs">
    <button id="roomTab" class="active" onclick="showSection('rooms')">🏠 Room Posts</button>
    <button id="mateTab" onclick="showSection('roommates')">👤 Roommate Posts</button>
  </div>

  <!-- Room Section -->
  <div id="roomSection" class="section active">
    <div class="stats">🏠 Total Rooms Posted: <span id="totalRooms">Loading...</span></div>
    <table>
      <thead>
        <tr>
          <th>Images</th><th>Name</th><th>Phone</th><th>Location</th>
          <th>Rent</th><th>Deposit</th><th>Facilities</th><th>Available</th>
          <th>Gender</th><th>Type</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="roomTableBody"></tbody>
    </table>
  </div>

  <!-- Roommate Section -->
  <div id="roommatesSection" class="section">
    <div class="stats">🤝 Total Roommate Posts: <span id="totalMates">Loading...</span></div>
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Gender</th><th>Phone</th><th>Email</th><th>Message</th><th>Replies</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="mateTableBody"></tbody>
    </table>
  </div>
</div>

<!-- EDIT ROOM MODAL -->
<div id="editRoomModal">
  <div class="modal-content">
    <h3>Edit Room Post</h3>
    <form id="editRoomForm">
      <input type="hidden" id="editIndex">
      <label>Name:<br><input type="text" id="editName" required></label><br><br>
      <label>Phone:<br><input type="text" id="editPhone" required></label><br><br>
      <label>Location:<br><input type="text" id="editLocation"></label><br><br>
      <label>Gender:<br>
        <select id="editGender">
          <option value="Boys">Boys</option><option value="Girls">Girls</option><option value="Both">Both</option>
        </select>
      </label><br><br>
      <label>Room Type:<br><input type="text" id="editType"></label><br><br>
      <label>Rent by Person (leave blank if not applicable):</label><br>
      <div id="editRentContainer"></div><br>
      <label>Deposit:<br><input type="text" id="editDeposit"></label><br><br>
      <label>Facilities:<br><input type="text" id="editFacilities"></label><br><br>
      <label>Available From:<br><input type="date" id="editAvailable"></label><br><br>
      <button type="submit" style="background:#4CAF50;color:white;padding:10px 20px;border:none;border-radius:5px;">Save</button>
      <button type="button" onclick="closeEditModal()" style="margin-left:10px;">Cancel</button>
    </form>
  </div>
</div>

<!-- EDIT ROOMMATE MODAL -->
<div id="editMateModal">
  <div class="modal-content">
    <h3>Edit Roommate Post</h3>
    <form id="editMateForm">
      <input type="hidden" id="editMateId">
      <label>Name:<br><input type="text" id="editMateName" required></label><br><br>
      <label>Phone:<br><input type="text" id="editMatePhone" required></label><br><br>
      <label>Email:<br><input type="email" id="editMateEmail" required></label><br><br>
      <label>Gender:<br>
        <select id="editMateGender">
          <option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
        </select>
      </label><br><br>
      <label>Message:<br><textarea id="editMateMessage" rows="4" required></textarea></label><br><br>
      <button type="submit" style="background:#4CAF50;color:white;padding:10px 20px;border:none;border-radius:5px;">Save</button>
      <button type="button" onclick="closeEditMateModal()" style="margin-left:10px;">Cancel</button>
    </form>
  </div>
</div>

<script>
/* ---------- LOGIN ---------- */
const errorMsg=document.getElementById("errorMsg");
function login(){
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value.trim();
  if(!username||!password){ errorMsg.textContent="Please enter both username and password."; return; }
  fetch('http://localhost:3000/admin-login',{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  })
  .then(res=>{
    if(res.status===200){
      document.getElementById("loginContainer").style.display="none";
      document.getElementById("dashboardContainer").style.display="block";
      loadRooms(); loadMates();
    } else errorMsg.textContent="Invalid credentials!";
  })
  .catch(()=>errorMsg.textContent="Server error. Try again.");
}
document.addEventListener("keydown",e=>{ if(e.key==="Enter") login(); });

/* ---------- DASHBOARD ---------- */
function showSection(section){
  document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
  document.getElementById(section+'Section').classList.add('active');
  document.getElementById('roomTab').classList.toggle('active',section==='rooms');
  document.getElementById('mateTab').classList.toggle('active',section==='roommates');
}
function formatRent(rentObj){
  if(!rentObj||typeof rentObj!=='object') return "-";
  return Object.entries(rentObj).sort((a,b)=>Number(a[0])-Number(b[0]))
    .map(([p,a])=>`P${p}: ₹${a}`).join("<br>");
}
function renderImageSlider(images,index){
  const id=`slider-${index}`;
  if(!images||!images.length) return "-";
  return `<div class="slider" id="${id}">
    ${images.map((src,i)=>`<img src="${src}" class="${i===0?'active':''}">`).join('')}
    <button class="slider-btn left" onclick="changeSlide('${id}',-1)">‹</button>
    <button class="slider-btn right" onclick="changeSlide('${id}',1)">›</button>
  </div>`;
}
function changeSlide(sliderId,direction){
  const slider=document.getElementById(sliderId);
  const imgs=slider.querySelectorAll('img');
  let activeIndex=Array.from(imgs).findIndex(img=>img.classList.contains('active'));
  imgs[activeIndex].classList.remove('active');
  let newIndex=(activeIndex+direction+imgs.length)%imgs.length;
  imgs[newIndex].classList.add('active');
}

/* ---------- FETCH DATA ---------- */
let roomPosts = [];
let matePosts = [];

function loadRooms(){
  fetch('http://localhost:3000/admin-data')
    .then(res=>res.json())
    .then(data=>{
      roomPosts = data;
      document.getElementById("totalRooms").innerText=data.length;
      const tbody=document.getElementById("roomTableBody"); tbody.innerHTML='';
      data.forEach((room,index)=>{
        const hiddenClass=room.hidden?'hidden-post':'';
        tbody.insertAdjacentHTML('beforeend',`
          <tr class="${hiddenClass}">
            <td>${renderImageSlider(room.imageLinks,index)}</td>
            <td>${room.name||"-"}</td>
            <td>${room.phone||"-"}</td>
            <td>${room.location||"-"}</td>
            <td>${formatRent(room.rent_by_person)}</td>
            <td>${room.deposit||"-"}</td>
            <td>${room.facilities||"-"}</td>
            <td>${room.available_from?new Date(room.available_from).toLocaleDateString():"-"}</td>
            <td>${room.gender||"-"}</td>
            <td>${room.room_type||"-"}</td>
            <td>
              <button class="edit-btn" onclick="editRoom('${room.id}')"
>Edit</button>
              <button class="delete-btn" onclick="deleteRoom('${room.id}')">Delete</button>

              
<td>
  <button class="edit-btn" onclick="editRoom('${room.id}')">Edit</button>
  <button class="delete-btn" onclick="deleteRoom('${room.id}')">Delete</button>
  <button class="hide-btn" onclick="toggleHideRoom('${room.id}')">
    ${room.hidden ? 'Unhide' : 'Hide'}
  </button>
</td>

          </tr>
        `);
      });
    });
}

function loadMates(){
  // backend me roommate posts /roommate-posts se aate hain, yaha simple admin ke liye /roommate-posts use karte hain
  fetch('http://localhost:3000/roommate-posts')
    .then(res=>res.json())
    .then(data=>{
      matePosts = data;
      document.getElementById("totalMates").innerText=data.length;
      const tbody=document.getElementById("mateTableBody"); tbody.innerHTML='';
      data.forEach((post,index)=>{
        const hiddenClass=post.hidden?'hidden-post':'';
        tbody.insertAdjacentHTML('beforeend',`
          <tr class="${hiddenClass}">
            <td>${post.name||"-"}</td>
            <td>${post.gender||"-"}</td>
            <td>${post.phone||"-"}</td>
            <td>${post.email||"-"}</td>
            <td>${post.message||"-"}</td>
            <td>${post.replies?post.replies.length:0}</td>
            <td>
              <button class="edit-btn" onclick="editMate(${index})">Edit</button>
              <button class="delete-btn" onclick="deleteMate(${index})">Delete</button>
              <button class="hide-btn" onclick="toggleHideMate(${index})">
                ${post.hidden?'Unhide':'Hide'}
              </button>
            </td>
          </tr>
        `);
      });
    });
}

/* ---------- ROOM OPERATIONS (backend index-based) ---------- */
function editRoom(id){
  const room = roomPosts.find(r => r.id === id);
  if(!room) return;

  document.getElementById("editIndex").value = id;
  document.getElementById("editName").value = room.name || '';
  document.getElementById("editPhone").value = room.phone || '';
  document.getElementById("editLocation").value = room.location || '';
  document.getElementById("editGender").value = room.gender || 'Both';
  document.getElementById("editType").value = room.room_type || '';
  document.getElementById("editDeposit").value = room.deposit || '';
  document.getElementById("editFacilities").value = room.facilities || '';
  document.getElementById("editAvailable").value = room.available_from || '';

  const rentContainer = document.getElementById("editRentContainer");
  rentContainer.innerHTML = '';

  if (room.rent_by_person) {
    Object.entries(room.rent_by_person).forEach(([p, amt]) => {
      rentContainer.insertAdjacentHTML('beforeend',
        `P<input type="number" value="${p}" style="width:60px;"> 
         : ₹<input type="number" value="${amt}" style="width:80px;"><br>`
      );
    });
  }

  document.getElementById("editRoomModal").style.display = "flex";
}


;

  document.getElementById("editRoomForm").addEventListener("submit", e => {
  e.preventDefault();

 const id = document.getElementById("editIndex").value;


  const rentContainer = document.getElementById("editRentContainer");
  const inputs = rentContainer.querySelectorAll("input");
  const rent_by_person = {};

  for (let i = 0; i < inputs.length; i += 2) {
    const persons = inputs[i].value;
    const amount = inputs[i + 1] ? inputs[i + 1].value : null;
    if (persons && amount) {
      rent_by_person[persons] = Number(amount);
    }
  }

  const payload = {
    name: document.getElementById("editName").value,
    phone: document.getElementById("editPhone").value,
    location: document.getElementById("editLocation").value,
    gender: document.getElementById("editGender").value,
    room_type: document.getElementById("editType").value,
    rent_by_person,
    deposit: document.getElementById("editDeposit").value,
    facilities: document.getElementById("editFacilities").value,
    available_from: document.getElementById("editAvailable").value
  };

 fetch(`http://localhost:3000/edit-room/${id}`, {

    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(res => {
    if (!res.ok) {
      throw new Error("Edit failed");
    }
    return res.json();
  })
  .then(() => {
    closeEditModal();
    loadRooms();
  })
  .catch(err => {
    console.error("Edit room error:", err);
    alert("Edit failed");
  });
});
;

function deleteRoom(id){
  if(!confirm("Delete this room?")) return;

  fetch(`http://localhost:3000/delete-room/${id}`,{
    method:"DELETE"
  })
  .then(res=>{
    if(res.ok){
      loadRooms();
    } else {
      alert("Failed to delete room");
    }
  })
  .catch(err=>{
    console.error("Delete room error",err);
    alert("Server error while deleting");
  });
}

function toggleHideRoom(id){
  const room = roomPosts.find(r => r.id === id);
  if(!room) return;

  fetch(`http://localhost:3000/toggle-room/${id}`,{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({hidden: !room.hidden})
  })
  .then(res=>{
    if(!res.ok) throw new Error();
    return res.json();
  })
  .then(()=>loadRooms())
  .catch(err=>{
    console.error("Hide room error",err);
  });
}

/* ---------- ROOMMATE OPERATIONS (id-based) ---------- */
function editMate(index){
  const post = matePosts[index];
  document.getElementById("editMateId").value = post.id;
  document.getElementById("editMateName").value = post.name || '';
  document.getElementById("editMatePhone").value = post.phone || '';
  document.getElementById("editMateEmail").value = post.email || '';
  document.getElementById("editMateGender").value = post.gender || 'Other';
  document.getElementById("editMateMessage").value = post.message || '';
  document.getElementById("editMateModal").style.display = "flex";
}

document.getElementById("editMateForm").addEventListener("submit",e=>{
  e.preventDefault();
  const id = document.getElementById("editMateId").value;
  const payload = {
    name: document.getElementById("editMateName").value,
    phone: document.getElementById("editMatePhone").value,
    email: document.getElementById("editMateEmail").value,
    gender: document.getElementById("editMateGender").value,
    message: document.getElementById("editMateMessage").value
  };

  fetch(`http://localhost:3000/roommate-edit/${id}`,{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  })
  .then(res=>{
  if(res.ok){
    closeEditMateModal();
    loadMates();
  } else {
    alert("Edit failed");
  }
})

    closeEditMateModal();
    loadMates();
  })
  .catch(err=>console.error("Edit mate error",err));
;

function deleteMate(index){
  const post = matePosts[index];
  if(!confirm("Delete this roommate post?")) return;

  fetch(`http://localhost:3000/roommate-delete/${post.id}`,{
    method:"DELETE"
  })
  .then(res=>{
    if(res.ok){
      loadMates();
    } else {
      alert("Failed to delete roommate post");
    }
  })
  .catch(err=>{
    console.error("Delete mate error",err);
    alert("Server error while deleting");
  });
}

function toggleHideMate(index){
  const post = matePosts[index];
  const newHidden = !post.hidden;
  fetch(`http://localhost:3000/roommate-hide/${post.id}`,{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({hidden:newHidden})
  })
  .then(res=>res.json())
  .then(()=>loadMates())
  .catch(err=>console.error("Hide mate error",err));
}

/* ---------- MODAL CLOSE ---------- */
function closeEditModal(){ document.getElementById("editRoomModal").style.display="none"; }
function closeEditMateModal(){ document.getElementById("editMateModal").style.display="none"; }
</script>
</body>
</html>
