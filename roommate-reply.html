<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💬 Private Chat - Find Near Room</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1716946158260812" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
  *{box-sizing:border-box}
body{
font-family:'Poppins',Arial,sans-serif;
background:#075e54;
margin:0;
padding:0;
height:100dvh;
width:100%;
overflow:hidden;
display:flex;
flex-direction:column;
}
  .header{background:#128c7e;padding:15px 20px;color:white;display:flex;align-items:center;gap:15px;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.2)}
  .back-btn{background:rgba(255,255,255,.2);color:white;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:20px;transition:.3s}
  .back-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.05)}
  .chat-partner{font-size:16px;font-weight:600;flex:1}
.chat-container{
flex:1;
background:#e5ddd5;
overflow-y:auto;
overflow-x:hidden;
padding:14px;
display:flex;
flex-direction:column;
gap:14px;
width:100%;
}
.message{
max-width:85%;
padding:14px 18px;
border-radius:20px;
font-size:18px;
line-height:1.6;
position:relative;
word-break:break-word;
overflow-wrap:break-word;
white-space:pre-wrap;
box-shadow:0 2px 6px rgba(0,0,0,.08);
animation:fadeIn .2s ease;
}
  .message.sent{background:#dcf8c6;align-self:flex-end;border-bottom-right-radius:5px}
  .message.received{background:white;align-self:flex-start;border-bottom-left-radius:5px}
  .message-time{font-size:11px;opacity:.7;margin-top:4px;text-align:right}
.input-area{
background:white;
padding:10px;
display:flex;
gap:10px;
align-items:flex-end;
width:100%;
border-top:1px solid #ddd;
}
.message-input{
flex:1;
border:none;
padding:15px 18px;
border-radius:25px;
font-size:18px;
background:#f0f0f0;
resize:none;
max-height:120px;
outline:none;
overflow-y:auto;
line-height:1.6;
width:100%;
}
.send-btn{
background:#25d366;
color:white;
border:none;
min-width:54px;
height:54px;
border-radius:50%;
cursor:pointer;
font-size:24px;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.send-btn:hover{
transform:scale(1.05);
}

.send-btn:active{
transform:scale(.95);
}
  .loading{width:20px;height:20px;border:2px solid #f3f3f3;border-top:2px solid #25d366;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
  @keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}
  </style>
</head>

<body>

<div class="header">
<a href="javascript:history.back()" class="back-btn">⬅️</a>
<div class="chat-partner" id="partnerInfo">Loading...</div>
</div>

<div class="chat-container" id="chatContainer">
<div style="text-align:center;color:#667781;font-size:14px;margin:50px 0">
💬 Private chat started<br>
<small>Only you and poster can see these messages</small>
</div>
</div>

<div class="input-area">
<textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
<button class="send-btn" id="sendBtn">📨</button>
</div>

<script>

/* ===========================
   GLOBAL VARIABLES
=========================== */

const BACKEND_URL='https://janam-cphc.onrender.com';
const urlParams=new URLSearchParams(window.location.search);

let pollingInterval=null;
let renderedMessages=new Set();

const urlChatId=urlParams.get("chatId");
const postIdFromQuery=urlParams.get("id");

let token=localStorage.getItem("fnrtoken");
let currentUser=null;
let partnerUser=null;
let chatId=urlChatId||null;

const chatContainer=document.getElementById("chatContainer");
const messageInput=document.getElementById("messageInput");
const sendBtn=document.getElementById("sendBtn");
const partnerInfo=document.getElementById("partnerInfo");

/* ===========================
   AUTO RESIZE
=========================== */

messageInput.addEventListener("input",function(){
this.style.height="auto";
this.style.height=Math.min(this.scrollHeight,120)+"px";
});

/* ===========================
   INIT
=========================== */

window.addEventListener("load",initChat);

async function initChat(){

if(!token){
window.location.href="userlogin.html";
return;
}

try{

const meRes=await fetch(`${BACKEND_URL}/me`,{
headers:{Authorization:`Bearer ${token}`}
});

const meData=await meRes.json();

if(!meRes.ok||!meData.success||!meData.user){
localStorage.removeItem("fnrtoken");
window.location.href="userlogin.html";
return;
}

currentUser=meData.user;

/* CASE 1: Direct chatId */
if(urlChatId){
chatId=urlChatId;
partnerInfo.textContent="Private chat";
await loadMessages();
startPollingMessages();
return;
}

/* CASE 2: From post */
if(!postIdFromQuery){
partnerInfo.textContent="Invalid chat link";
return;
}

const postRes=await fetch(`${BACKEND_URL}/posts/${postIdFromQuery}`,{
headers:{Authorization:`Bearer ${token}`}
});

const postData=await postRes.json();

if(postRes.ok&&postData.success&&postData.post){

const post=postData.post;

partnerUser={
id:post.poster_user_id||post.posterId||post.userId||post.user_id,
name:post.poster_name||post.name||"User"
};

if(!partnerUser.id||partnerUser.id===currentUser.id){
partnerInfo.textContent="Cannot chat with yourself";
return;
}

partnerInfo.textContent=partnerUser.name;

chatId=`${currentUser.id}_${partnerUser.id}_${postIdFromQuery}`;

await loadMessages();
startPollingMessages();

}else{
partnerInfo.textContent="Post not found";
}

}catch(err){
console.error(err);
partnerInfo.textContent="Error loading chat";
}

}

/* ===========================
   LOAD MESSAGES
=========================== */

async function loadMessages(){

if(!chatId)return;

try{

const res=await fetch(`${BACKEND_URL}/chat/${chatId}`,{
headers:{Authorization:`Bearer ${token}`}
});

const data=await res.json();

if(res.ok&&data.success&&Array.isArray(data.messages)){

data.messages.forEach(msg=>{

const uniqueKey=msg.senderId+"_"+msg.message+"_"+msg.timestamp;

if(!renderedMessages.has(uniqueKey)){
addMessage(msg);
renderedMessages.add(uniqueKey);
}

});

}

}catch(err){
console.error("Load error:",err);
}

}

/* ===========================
   ADD MESSAGE
=========================== */

function addMessage(msg){

if(!currentUser)return;

const isMine=String(msg.senderId)===String(currentUser.id);

const div=document.createElement("div");
div.className=`message ${isMine?"sent":"received"}`;

div.innerHTML=`
${escapeHtml(msg.message||"")}
<div class="message-time">
${formatTime(msg.timestamp||Date.now())}
</div>
`;

const isAtBottom=
chatContainer.scrollHeight-chatContainer.scrollTop<=
chatContainer.clientHeight+50;

chatContainer.appendChild(div);

if(isAtBottom){
chatContainer.scrollTop=chatContainer.scrollHeight;
}

}

/* ===========================
   SEND MESSAGE
=========================== */

async function sendMessage(){

const content=messageInput.value.trim();
if(!content||!chatId)return;

sendBtn.disabled=true;
sendBtn.innerHTML='<div class="loading"></div>';

try{

const res=await fetch(`${BACKEND_URL}/private-message`,{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:`Bearer ${token}`
},
body:JSON.stringify({
chatId:chatId,
message:content
})
});

const data=await res.json();

if(res.ok&&data.success){

messageInput.value="";
messageInput.style.height="auto";

const tempMsg={
senderId:currentUser.id,
message:content,
timestamp:new Date().toISOString()
};

addMessage(tempMsg);

const uniqueKey=
tempMsg.senderId+"_"+tempMsg.message+"_"+tempMsg.timestamp;

renderedMessages.add(uniqueKey);

}else{
alert("Failed to send");
}

}catch(err){
alert("Network error");
}

sendBtn.disabled=false;
sendBtn.innerHTML="📨";

}

/* ===========================
   HELPERS
=========================== */

function formatTime(timestamp){
return new Date(timestamp).toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
});
}

function escapeHtml(text){
const div=document.createElement("div");
div.textContent=text;
return div.innerHTML;
}

function startPollingMessages(){
if(pollingInterval)return;
pollingInterval=setInterval(loadMessages,5000);
}

/* ===========================
   EVENTS
=========================== */

sendBtn.onclick=sendMessage;

messageInput.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault();
sendMessage();
}
});

</script>

</body>
</html>
